# A generic, single database configuration for Alembic
[alembic]
# path to migration scripts
script_location = database/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date
# timezone = UTC

# sqlalchemy.url = postgresql://enterprise_admin:SecretPassword@123@localhost:5432/tasktracker_pro

[post_write_hooks]

[logging]
default_handler = console
loggers = root,sqlalchemy,alembic
handlers = console
qualname =

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
