# Nginx configuration for TaskTracker Pro Enterprise Edition
# Redirects HTTP traffic, proxies REST APIs to FastAPI, and handles Streamlit WebSockets

server {
    listen 80;
    server_name localhost tasktracker.enterprise.local;

    # Set client upload limit for PDF evidence files (15MB to allow some headroom over 10MB file limit)
    client_max_body_size 15M;

    # 1. Route FastAPI backend REST APIs
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for streaming responses (CSV/PDF reports)
        proxy_buffering off;
    }

    # 2. Route Streamlit Frontend WebSocket connections
    location /_stcore/stream {
        proxy_pass http://127.0.0.1:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # 3. Route general Streamlit Frontend static files & requests
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
